<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Admin Dashboard - Firebase</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Auth & Nav */
        #authBox { max-width: 400px; margin: 100px auto; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        button { border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { background: none; color: #64748b; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); border-radius: 0; }

        /* Tables & Lists */
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .status-pass { color: var(--success); font-weight: bold; }
        .status-fail { color: var(--danger); font-weight: bold; }

        .hidden { display: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80ch; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="authBox" class="card">
        <h2 style="text-align: center;">Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn" class="btn-primary" style="width: 100%;">Login</button>
    </div>

    <div id="dashboard" class="hidden">
        <div class="nav-header">
            <h1>Admin Control</h1>
            <button id="logoutBtn" class="btn-danger">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('create')">Create Quiz</button>
            <button class="tab-btn" onclick="switchTab('manage')">Manage Banks</button>
            <button class="tab-btn" onclick="switchTab('results')">Student Results</button>
        </div>

        <div id="createSection">
            <div class="card">
                <h3>New Question Bank</h3>
                <input type="text" id="bankName" placeholder="Bank Name">
                <input type="number" id="quizTimer" placeholder="Time per question (seconds)">
                <textarea id="aiText" style="height: 150px;" placeholder="Paste AI MCQs here..."></textarea>
                <button id="parseBtn" class="btn-primary" style="width: 100%;">Parse & Review</button>
            </div>
            <div id="previewArea" class="card hidden">
                <h3>Review</h3>
                <div id="previewList"></div>
                <button id="saveQuizBtn" class="btn-success" style="width: 100%;">Save to Cloud</button>
            </div>
        </div>

        <div id="manageSection" class="hidden">
            <div class="card">
                <h3>All Question Banks</h3>
                <table>
                    <thead><tr><th>Bank Name</th><th>Questions</th><th>Timer</th><th>Actions</th></tr></thead>
                    <tbody id="bankTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="resultsSection" class="hidden">
            <div class="card">
                <h3>Recent Attempts</h3>
                <table>
                    <thead><tr><th>Student</th><th>Quiz</th><th>Score</th><th>Action</th></tr></thead>
                    <tbody id="resultsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="detailModal" class="modal hidden">
    <div class="modal-content">
        <h2 id="modalStudentName">Result Details</h2>
        <div id="modalDetailsList"></div>
        <button onclick="closeModal()" class="btn-primary" style="margin-top: 20px;">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyACKQAD1sIUGdOjncQkfjMrmGh4x_U0v74",
        authDomain: "quiz-76725.firebaseapp.com",
        projectId: "quiz-76725",
        storageBucket: "quiz-76725.firebasestorage.app",
        messagingSenderId: "352657593612",
        appId: "1:352657593612:web:80054cb0dcdc3a97c1a529"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let tempQuestions = [];
    let editingId = null;

    // --- Tab Management ---
    window.switchTab = (tab) => {
        document.getElementById('createSection').classList.toggle('hidden', tab !== 'create');
        document.getElementById('manageSection').classList.toggle('hidden', tab !== 'manage');
        document.getElementById('resultsSection').classList.toggle('hidden', tab !== 'results');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
        if(tab === 'manage') loadBanks();
        if(tab === 'results') loadResults();
    };

    // --- Auth ---
    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
    };
    onAuthStateChanged(auth, u => {
        document.getElementById('authBox').classList.toggle('hidden', !!u);
        document.getElementById('dashboard').classList.toggle('hidden', !u);
    });
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // --- 1. Create/Edit Quiz ---
    document.getElementById('parseBtn').onclick = () => {
        const text = document.getElementById('aiText').value;
        tempQuestions = [];
        const blocks = text.split(/\n(?=\d+[\.\)])/);
        blocks.forEach(b => {
            const lines = b.split('\n').map(l => l.trim()).filter(l => l);
            if(lines.length < 3) return;
            const q = lines[0].replace(/^\d+[\.\)]\s*/, "");
            const opts = lines.filter(l => l.match(/^[A-D][\.\)]/i));
            const ansLine = lines.find(l => l.toLowerCase().includes("correct"));
            const cor = ansLine ? ansLine.split(/[:\-]/).pop().trim().charAt(0).toUpperCase() : "A";
            tempQuestions.push({ question: q, options: opts, correct: cor });
        });
        document.getElementById('previewList').innerHTML = tempQuestions.map(q => `<p><b>${q.question}</b> (Ans: ${q.correct})</p>`).join('');
        document.getElementById('previewArea').classList.remove('hidden');
    };

    document.getElementById('saveQuizBtn').onclick = async () => {
        const data = {
            bankName: document.getElementById('bankName').value,
            timePerQuestion: document.getElementById('quizTimer').value || 30,
            questions: tempQuestions,
            updatedAt: new Date()
        };
        try {
            if(editingId) {
                await updateDoc(doc(db, "quizzes", editingId), data);
                alert("Bank Updated!");
                editingId = null;
            } else {
                await addDoc(collection(db, "quizzes"), data);
                alert("Bank Saved!");
            }
            location.reload();
        } catch(e) { alert("Error: " + e.message); }
    };

    // --- 2. Manage Banks ---
    async function loadBanks() {
        const snap = await getDocs(collection(db, "quizzes"));
        const body = document.getElementById('bankTableBody');
        body.innerHTML = "";
        snap.forEach(d => {
            const q = d.data();
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${q.bankName}</td>
                <td>${q.questions.length} Qs</td>
                <td>${q.timePerQuestion}s</td>
                <td>
                    <button class="btn-primary" onclick="editBank('${d.id}')">Edit</button>
                    <button class="btn-danger" onclick="deleteBank('${d.id}')">Delete</button>
                </td>
            `;
            body.appendChild(row);
        });
    }

    window.deleteBank = async (id) => {
        if(confirm("Delete this entire bank?")) {
            await deleteDoc(doc(db, "quizzes", id));
            loadBanks();
        }
    };

    window.editBank = async (id) => {
        editingId = id;
        const snap = await getDocs(collection(db, "quizzes"));
        const quiz = snap.docs.find(d => d.id === id).data();
        document.getElementById('bankName').value = quiz.bankName;
        document.getElementById('quizTimer').value = quiz.timePerQuestion;
        document.getElementById('aiText').value = quiz.questions.map((q, i) => `${i+1}. ${q.question}\n${q.options.join('\n')}\nCorrect Answer: ${q.correct}`).join('\n\n');
        switchTab('create');
        alert("Text loaded. Click 'Parse' to refresh the review list before saving.");
    };

    // --- 3. View Results & Details ---
    async function loadResults() {
        const q = query(collection(db, "results"), orderBy("date", "desc"));
        const snap = await getDocs(q);
        const body = document.getElementById('resultsTableBody');
        body.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${r.studentName}</td>
                <td>${r.quizName}</td>
                <td>${r.score}%</td>
                <td><button class="btn-primary" onclick="viewResultDetail('${d.id}')">View Details</button></td>
            `;
            body.appendChild(row);
        });
    }

    window.viewResultDetail = async (id) => {
        const snap = await getDocs(collection(db, "results"));
        const r = snap.docs.find(d => d.id === id).data();
        document.getElementById('modalStudentName').innerText = `${r.studentName} - ${r.quizName}`;
        
        // This assumes 'answers' array exists in the result document
        if(!r.detailedAnswers) {
            document.getElementById('modalDetailsList').innerHTML = "<p>No detailed data found. (Update Student page first)</p>";
        } else {
            document.getElementById('modalDetailsList').innerHTML = r.detailedAnswers.map(a => `
                <div style="margin-bottom:10px; padding:10px; border-radius:5px; background:${a.isCorrect ? '#dcfce7':'#fee2e2'}">
                    <b>${a.question}</b><br>
                    Selected: ${a.selected} | Correct: ${a.correct}
                </div>
            `).join('');
        }
        document.getElementById('detailModal').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('detailModal').classList.add('hidden');

</script>
</body>
</html>
