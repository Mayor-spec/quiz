<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - AI Quiz</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f1f5f9; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        
        /* Timer Styles */
        .timer-container { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #timerBar { height: 100%; background: var(--danger); width: 100%; transition: linear 1s; }
        #timerText { font-weight: bold; color: var(--danger); float: right; margin-bottom: 5px; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .option-btn { background: #f8fafc; color: var(--text); border: 1px solid #e2e8f0; text-align: left; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary); background: #f1f5f9; }
        .option-btn.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534; }
        .option-btn.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b; }
        
        .hidden { display: none; }
        .admin-link { position: fixed; bottom: 15px; right: 15px; opacity: 0.2; text-decoration: none; color: gray; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupScreen" class="card">
        <h1>Welcome to the Quiz</h1>
        <p>Please enter your name and select the assigned test.</p>
        <input type="text" id="studentName" placeholder="Full Name">
        <select id="quizSelect"><option>Loading quizzes...</option></select>
        <button id="startBtn">Start Quiz</button>
    </div>

    <div id="quizScreen" class="hidden">
        <div id="timerText">0s</div>
        <div class="timer-container"><div id="timerBar"></div></div>
        
        <div class="card">
            <h2 id="qText">Question?</h2>
            <div id="optionsGrid"></div>
        </div>
    </div>

    <div id="finishScreen" class="hidden card" style="text-align: center;">
        <h1>Test Complete!</h1>
        <div id="finalScore" style="font-size: 60px; font-weight: bold; color: var(--primary);">0%</div>
        <p id="feedbackMsg"></p>
        <button onclick="location.reload()" style="background: #64748b;">Exit Portal</button>
    </div>
</div>

<a href="admin.html" class="admin-link">Admin Access</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyACKQAD1sIUGdOjncQkfjMrmGh4x_U0v74",
        authDomain: "quiz-76725.firebaseapp.com",
        projectId: "quiz-76725",
        storageBucket: "quiz-76725.firebasestorage.app",
        messagingSenderId: "352657593612",
        appId: "1:352657593612:web:80054cb0dcdc3a97c1a529"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let quizzes = [];
    let activeQuiz = null;
    let currentIdx = 0;
    let score = 0;
    let studentDetailedAnswers = [];
    let timerInterval = null;
    let timeLeft = 0;

    // Load available quizzes
    window.onload = async () => {
        const snap = await getDocs(collection(db, "quizzes"));
        const select = document.getElementById('quizSelect');
        select.innerHTML = '<option value="">-- Select Quiz --</option>';
        snap.forEach(doc => {
            quizzes.push({id: doc.id, ...doc.data()});
            select.innerHTML += `<option value="${doc.id}">${doc.data().bankName}</option>`;
        });
    };

    document.getElementById('startBtn').onclick = () => {
        const name = document.getElementById('studentName').value;
        const qId = document.getElementById('quizSelect').value;
        if(!name || !qId) return alert("Please enter your name and select a quiz!");

        activeQuiz = quizzes.find(q => q.id === qId);
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.remove('hidden');
        showQuestion();
    };

    function showQuestion() {
        clearInterval(timerInterval);
        const q = activeQuiz.questions[currentIdx];
        document.getElementById('qText').innerText = `${currentIdx + 1}. ${q.question}`;
        
        const container = document.getElementById('optionsGrid');
        container.innerHTML = "";

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleChoice(opt, btn);
            container.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        timeLeft = parseInt(activeQuiz.timePerQuestion) || 30;
        const totalTime = timeLeft;
        const bar = document.getElementById('timerBar');
        const text = document.getElementById('timerText');

        timerInterval = setInterval(() => {
            timeLeft--;
            text.innerText = timeLeft + "s";
            bar.style.width = (timeLeft / totalTime) * 100 + "%";

            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                handleChoice(null, null); // Force "Wrong" on timeout
            }
        }, 1000);
    }

    async function handleChoice(selectedStr, btn) {
        clearInterval(timerInterval);
        const q = activeQuiz.questions[currentIdx];
        const correctLetter = q.correct;
        const selectedLetter = selectedStr ? selectedStr.trim().charAt(0).toUpperCase() : "NONE";

        const isCorrect = selectedLetter === correctLetter;
        if(isCorrect) {
            score++;
            if(btn) btn.classList.add('correct');
        } else {
            if(btn) btn.classList.add('wrong');
            // Auto-highlight correct one if they failed
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => {
                if(b.innerText.trim().charAt(0).toUpperCase() === correctLetter) b.classList.add('correct');
            });
        }

        // Save detailed data for Admin
        studentDetailedAnswers.push({
            question: q.question,
            selected: selectedLetter,
            correct: correctLetter,
            isCorrect: isCorrect
        });

        setTimeout(() => {
            currentIdx++;
            if(currentIdx < activeQuiz.questions.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }, 1500);
    }

    async function finishQuiz() {
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('finishScreen').classList.remove('hidden');

        const finalPercent = Math.round((score / activeQuiz.questions.length) * 100);
        document.getElementById('finalScore').innerText = finalPercent + "%";
        document.getElementById('feedbackMsg').innerText = `You got ${score} out of ${activeQuiz.questions.length} correct.`;

        // Push detailed result to Firebase
        try {
            await addDoc(collection(db, "results"), {
                studentName: document.getElementById('studentName').value,
                quizName: activeQuiz.bankName,
                score: finalPercent,
                detailedAnswers: studentDetailedAnswers,
                date: new Date().toLocaleString()
            });
        } catch(e) { console.error("Error saving result:", e); }
    }
</script>
</body>
</html>
